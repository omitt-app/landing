<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>omitt - admin</title>
<link rel="icon" href="/favicon.ico">
<link rel="stylesheet" href="/assets/fonts/fonts.css">
<style>
  :root { --ink:#0D0D0C; --cream:#F9F2ED; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--ink); color:rgba(249,242,237,.70); font-family:'Nunito',-apple-system,sans-serif; min-height:100vh; padding:40px 20px; }
  .wrap { max-width:860px; margin:0 auto; }
  h1 { color:var(--cream); font-weight:800; letter-spacing:-0.025em; font-size:28px; margin-bottom:24px; }
  h1 span { opacity:.45; font-weight:400; }
  .card { background:rgba(249,242,237,.05); border-radius:12px; padding:20px; margin-bottom:16px; }
  input, select, textarea { background:rgba(249,242,237,.08); border:1px solid rgba(249,242,237,.15); color:var(--cream); border-radius:8px; padding:10px 12px; font:inherit; width:100%; }
  input:focus, select:focus { outline:2px solid rgba(249,242,237,.4); }
  button { background:var(--cream); color:var(--ink); border:0; border-radius:8px; padding:10px 18px; font:inherit; font-weight:700; cursor:pointer; }
  button.ghost { background:transparent; color:rgba(249,242,237,.55); border:1px solid rgba(249,242,237,.2); font-weight:400; padding:6px 12px; }
  button:hover { opacity:.9; }
  .row { display:flex; gap:12px; align-items:center; }
  .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:12px; margin-bottom:20px; }
  .stat { background:rgba(249,242,237,.05); border-radius:12px; padding:16px; text-align:center; }
  .stat b { display:block; color:var(--cream); font-size:26px; font-weight:800; }
  .stat span { font-size:12px; opacity:.55; }
  .item { border-top:1px solid rgba(249,242,237,.1); padding:14px 0; }
  .item:first-child { border-top:0; }
  .meta { font-size:12px; color:rgba(249,242,237,.62); margin-bottom:6px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .badge { border:1px solid rgba(249,242,237,.25); border-radius:20px; padding:1px 10px; }
  .badge.new { background:var(--cream); color:var(--ink); border-color:var(--cream); font-weight:700; }
  .msg { color:rgba(249,242,237,.85); white-space:pre-wrap; margin-bottom:8px; }
  .hidden { display:none; }
  .err { color:var(--cream); background:rgba(249,242,237,.08); padding:8px 12px; border-radius:8px; margin-top:10px; font-size:14px; }
  .toolbar { display:flex; gap:12px; margin-bottom:16px; align-items:center; }
  .toolbar select { width:auto; }
  a { color:rgba(249,242,237,.7); }
</style>
</head>
<body>
<div class="wrap">
  <h1>omitt <span>/ admin</span></h1>

  <div id="login" class="card">
    <div class="row" style="flex-direction:column; align-items:stretch; gap:10px;">
      <input id="email" type="email" placeholder="admin email" aria-label="Admin email" autocomplete="username">
      <input id="password" type="password" placeholder="password" aria-label="Password" autocomplete="current-password">
      <button id="loginBtn">Sign in</button>
      <div id="loginErr" class="err hidden" role="alert" aria-live="polite"></div>
    </div>
  </div>

  <div id="panel" class="hidden">
    <div class="stats" id="stats"></div>
    <div class="toolbar">
      <select id="filter" aria-label="Feedback filter">
        <option value="active">New + read</option>
        <option value="new">New only</option>
        <option value="all">Everything</option>
        <option value="archived">Archived</option>
      </select>
      <button class="ghost" id="refresh">Refresh</button>
      <span style="flex:1"></span>
      <a href="https://app.loops.so" target="_blank" rel="noopener">Waitlist stats -&gt; Loops</a>
      <button class="ghost" id="logout">Sign out</button>
    </div>
    <div class="card" id="list"></div>
  </div>
</div>

<!-- Self-hosted (v2.110.2) - the admin page must not depend on any CDN -->
<script src="/assets/js/supabase.min.js"></script>
<script>
const SB_URL = 'https://yewwxmvypnwqluayxoxg.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlld3d4bXZ5cG53cWx1YXl4b3hnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MTIyNzcsImV4cCI6MjA5OTI4ODI3N30.BeJVq6GyuhwBYA-UqNmuET1Cl0ACDrRYC-1rLFuzZQc';
const db = supabase.createClient(SB_URL, SB_ANON);

const $ = (id) => document.getElementById(id);

async function refresh() {
  const filter = $('filter').value;
  let q = db.from('feedback').select('*').order('created_at', { ascending: false }).limit(500);
  if (filter === 'new') q = q.eq('status', 'new');
  else if (filter === 'archived') q = q.eq('status', 'archived');
  else if (filter === 'active') q = q.neq('status', 'archived');
  const { data, error } = await q;
  if (error) { $('list').textContent = error.message; return; }

  const now = Date.now(), week = 7 * 864e5;
  const all = data || [];
  const stats = {
    total: all.length,
    fresh: all.filter(r => r.status === 'new').length,
    week: all.filter(r => now - new Date(r.created_at) < week).length,
    bugs: all.filter(r => r.category === 'bug').length,
    ideas: all.filter(r => r.category === 'idea').length,
  };
  const statItems = [
    [stats.total, 'shown'], [stats.fresh, 'new'], [stats.week, 'last 7 days'],
    [stats.bugs, 'bugs'], [stats.ideas, 'ideas'],
  ];
  $('stats').replaceChildren(...statItems.map(([value, label]) => {
    const item = document.createElement('div');
    item.className = 'stat';
    const count = document.createElement('b');
    const name = document.createElement('span');
    count.textContent = String(value);
    name.textContent = label;
    item.append(count, name);
    return item;
  }));

  $('list').replaceChildren();
  if (!all.length) $('list').textContent = 'Nothing here yet.';
  for (const r of all) {
    const el = document.createElement('div');
    el.className = 'item';
    const date = new Date(r.created_at).toLocaleString();
    const meta = document.createElement('div');
    meta.className = 'meta';
    const addMeta = (value, className = '') => {
      const span = document.createElement('span');
      span.className = className;
      span.textContent = value;
      meta.appendChild(span);
    };
    addMeta(String(r.status), `badge${r.status === 'new' ? ' new' : ''}`);
    addMeta(String(r.category), 'badge');
    addMeta(date);
    if (r.app_version) addMeta(`v${String(r.app_version)}`);
    if (r.email) {
      const email = String(r.email);
      const link = document.createElement('a');
      link.textContent = email;
      link.href = `mailto:${encodeURIComponent(email)}`;
      meta.appendChild(link);
    }

    const message = document.createElement('div');
    message.className = 'msg';
    message.textContent = String(r.message);
    const actions = document.createElement('div');
    actions.className = 'row';
    const makeAction = (label, action) => {
      const button = document.createElement('button');
      button.className = 'ghost';
      button.textContent = label;
      button.onclick = async () => {
        button.disabled = true;
        const { error: updateError } = await db.from('feedback').update({ status: action }).eq('id', r.id);
        if (updateError) {
          button.disabled = false;
          $('list').prepend(document.createTextNode(`Could not update: ${updateError.message} `));
          return;
        }
        refresh();
      };
      actions.appendChild(button);
    };
    if (r.status === 'new') makeAction('Mark read', 'read');
    if (r.status !== 'archived') makeAction('Archive', 'archived');
    else makeAction('Unarchive', 'new');
    el.append(meta, message, actions);
    $('list').appendChild(el);
  }
}

async function show() {
  const { data: { session } } = await db.auth.getSession();
  $('login').classList.toggle('hidden', !!session);
  $('panel').classList.toggle('hidden', !session);
  if (session) refresh();
}

$('loginBtn').onclick = async () => {
  const { error } = await db.auth.signInWithPassword({
    email: $('email').value.trim(), password: $('password').value,
  });
  $('loginErr').classList.toggle('hidden', !error);
  if (error) $('loginErr').textContent = error.message;
  show();
};
$('password').addEventListener('keydown', e => { if (e.key === 'Enter') $('loginBtn').click(); });
$('logout').onclick = async () => { await db.auth.signOut(); show(); };
$('refresh').onclick = refresh;
$('filter').onchange = refresh;
show();
</script>
</body>
</html>
